<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Last Drive: Apocalypse</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #c2b280; font-family: 'Courier New', Courier, monospace; touch-action: none; width: 100vw; height: 100vh; }
        canvas { display: block; z-index: 1; }

        /* HUD UI */
        #hud { 
            position: fixed; top: 10px; left: 10px; 
            background: rgba(28, 26, 17, 0.95); 
            color: #f0f0f0; padding: 15px; 
            border: 1px solid #444; border-radius: 2px; 
            z-index: 100; font-size: 16px; line-height: 1.5;
            display: none; 
        }
        .admin-link { color: #555; cursor: pointer; text-decoration: none; font-size: 13px; margin-top: 5px; display: block; }

        #scrapUI { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; color: #ffd700; border: 1px solid #ffd700; z-index: 100; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .scrap-img { width: 20px; height: 20px; }

        /* MULTIPLAYER PANEL */
        #mpPanel { position: fixed; right: 10px; top: 70px; width: 220px; background: rgba(0,0,0,0.9); border: 2px solid cyan; padding: 10px; color: white; z-index: 100; text-align: center; }
        #usernameIn { width: 90%; padding: 5px; margin-bottom: 5px; background: #111; color: white; border: 1px solid #444; text-align: center; }
        .btn { background: #222; color: cyan; border: 1px solid cyan; padding: 8px; margin: 4px 0; cursor: pointer; width: 100%; font-family: monospace; font-weight: bold; }
        #joinIn { width: 90%; background: #111; color: white; border: 1px solid #444; padding: 5px; text-align: center; margin-bottom: 5px; }

        /* ADMIN ACCESS UI */
        #pinBox { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; border: 2px solid #fff; padding: 20px; z-index: 3000; display: none; text-align: center; color: white; }
        #pinInput { width: 80%; padding: 10px; background: #000; color: #fff; border: 1px solid #fff; margin-bottom: 10px; text-align: center; font-size: 18px; }

        /* GREEN COMMAND CONSOLE */
        #cmdBox { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); width: 450px; background: rgba(0,0,0,0.9); border: 2px solid #0f0; z-index: 2000; display: none; }
        #cmdInput { width: 100%; background: none; border: none; color: #0f0; padding: 12px; font-family: monospace; outline: none; box-sizing: border-box; font-size: 14px; }

        /* SCREENS */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; z-index: 1000; background: black; color: white; text-align: center; }
        #winScreen h1 { color: #00ff00; font-size: 60px; }
        #deathScreen h1 { color: #ff0000; font-size: 60px; }
        .dist-txt { font-size: 24px; margin: 20px 0; font-weight: bold; }
        .end-btn { padding: 15px 30px; margin: 10px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; min-width: 250px; font-family: 'Courier New', monospace; }
        .yellow { background: #f1c40f; color: black; }
        .green { background: #2ecc71; color: white; }

        /* MISC */
        #prompt { position: fixed; bottom: 35%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #f1c40f; padding: 15px 30px; border: 2px solid white; z-index: 100; display: none; font-weight: bold; text-align: center; }
        #timer { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #000; color: red; border: 2px solid red; padding: 10px 20px; font-size: 24px; display: none; z-index: 200; font-weight: bold; }
        #mobileUI { position: fixed; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 500; pointer-events: none; }
        .t-grp { display: flex; flex-direction: column; align-items: center; pointer-events: auto; }
        .t-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; margin: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <audio id="sndLobby" src="lobby.mp3" loop></audio>
    <audio id="sndSpag" src="spaghetti.mp3" loop></audio>
    <audio id="sndAction" src="action.mp3"></audio>
    <audio id="sndOutlaw" src="outlaw.mp3"></audio>
    <audio id="sndBridge" src="bridgebattle.mp3" loop></audio>
    <audio id="sndBallad" src="ballad.mp3" loop></audio>

    <!-- ADMIN SYSTEM -->
    <div id="pinBox">
        <h3>ENTER ACCESS PIN</h3>
        <input type="password" id="pinInput" maxlength="4">
        <div id="pinError" style="color:red; display:none; margin-bottom:10px;">WRONG PIN</div>
        <button class="btn" onclick="verifyPin()">ENTER</button>
        <button class="btn" style="color:red;" onclick="closePin()">CANCEL</button>
    </div>

    <div id="cmdBox"><input type="text" id="cmdInput" value="/login "></div>

    <div id="hud">
        $ <span id="vMoney">50</span> | Ammo: <span id="vAmmo">50</span><br>
        T-Ammo: <span id="vTAmmo">0</span> | Gold: <span id="vGold">0</span> | Silver: <span id="vSilver">0</span><br>
        Armor: <span id="vArmor">None</span><br>
        Dist: <span id="vDist">0</span>m / 10000m<br>
        <span class="admin-link" onclick="openPin()">[_ Admin Access _]</span>
    </div>

    <div id="scrapUI">
        <img src="scrap.png" class="scrap-img"> <span id="vScrap">50</span>
    </div>

    <div id="mpPanel">
        <input type="text" id="usernameIn" placeholder="USERNAME" maxlength="12">
        <div id="roomCode" style="color:cyan; font-size: 11px; margin-bottom: 5px;">ID: Offline</div>
        <button class="btn" onclick="hostGame()">HOST</button>
        <input type="text" id="joinIn" placeholder="JOIN CODE">
        <button class="btn" onclick="joinGame()">JOIN</button>
    </div>

    <div id="startScreen" class="overlay">
        <h1 style="color: #f1c40f;">LAST DRIVE</h1>
        <button class="end-btn green" onclick="initLobby()">ENTER LOBBY</button>
    </div>

    <div id="winScreen" class="overlay" style="display:none;">
        <h1>You Escaped!</h1>
        <div class="dist-txt">Final Distance: 10000 m</div>
        <button class="end-btn green" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <div id="deathScreen" class="overlay" style="display:none;">
        <h1>Everyone died...</h1>
        <div class="dist-txt">Final Distance: <span id="deathDist">0</span> m</div>
        <button class="end-btn yellow" onclick="location.reload()">RESTART</button>
        <button class="end-btn green" onclick="reviveTeam()">REVIVE TEAM (75 SCRAPS)</button>
    </div>

    <div id="timer">EVACUATION: 4:00</div>
    <div id="prompt">INTERACT</div>

    <div id="mobileUI">
        <div class="t-grp"><div class="t-btn" id="tW">W</div><div style="display:flex"><div class="t-btn" id="tA">A</div><div class="t-btn" id="tS">S</div><div class="t-btn" id="tD">D</div></div></div>
        <div class="t-grp"><div style="display:flex"><div class="t-btn" id="tE">E</div><div class="t-btn" id="tF">F</div><div class="t-btn" id="tG">G</div></div><div class="t-btn" id="tFire" style="background:rgba(255,0,0,0.5)">FIRE</div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        const zoom = isMobile ? 0.5 : 0.75;
        if(isMobile) document.getElementById('mobileUI').style.display='flex';

        let gameState = "START", isHost = false, isAdmin = false, peer, conn;
        let player = {
            x: 0, y: 50300, angle: 0, speed: 0, hp: 100, maxHp: 100, 
            money: 50, scraps: 50, ammo: 50, tammo: 0, gold: 0, silver: 0,
            armor: 'None', armorHP: 0, speedM: 1, dmgM: 1, radar: false, turret: false,
            maxDist: 0, cooldown: 0, name: "Player"
        };

        let remotePlayers = {}, entities = [], bullets = [], buildings = [], outposts = [];
        let finale = { active: false, timer: 240, crank: false, spawned: 0, lastS: 0 };
        let cheats = { god: false, ammo: false };
        let lastBattleTrack = null;

        const snd = {
            lobby: document.getElementById('sndLobby'), spag: document.getElementById('sndSpag'),
            action: document.getElementById('sndAction'), outlaw: document.getElementById('sndOutlaw'),
            bridge: document.getElementById('sndBridge'), ballad: document.getElementById('sndBallad')
        };

        // --- ADMIN SYSTEM ---
        function openPin() { document.getElementById('pinBox').style.display = 'block'; }
        function closePin() { document.getElementById('pinBox').style.display = 'none'; }
        function verifyPin() {
            if(document.getElementById('pinInput').value === "3412") {
                document.getElementById('pinBox').style.display = 'none';
                document.getElementById('cmdBox').style.display = 'block';
                document.getElementById('cmdInput').focus();
            } else {
                document.getElementById('pinError').style.display = 'block';
            }
        }

        document.getElementById('cmdInput').addEventListener('keydown', e => {
            if(e.key === 'Enter') { handleCommand(e.target.value); e.target.value = "/"; }
        });

        function handleCommand(val) {
            const regex = /\/(\w+)\s+@?([\w\d]+)(?:\[(.*?)\])?/;
            const match = val.match(regex);
            if(!match) return;

            const cmd = match[1], target = match[2], data = match[3];

            if(cmd === "login") {
                if(data === "389393") { isAdmin = true; alert("Admin Access Unlocked"); }
                else { alert("WRONG PIN"); }
                return;
            }
            if(!isAdmin) return;

            const applyStat = (obj, stat, value) => {
                const v = parseFloat(value);
                if(stat === "Health") { obj.hp = v; obj.maxHp = v; }
                if(stat === "Speed") obj.speedM = v;
                if(stat === "Damage") obj.dmgM = v;
                if(stat === "Money") obj.money = v;
            };

            const runTarget = (t, d) => {
                const pair = d ? d.split(':') : [];
                if(t === "s" || t === player.name) applyStat(player, pair[0], pair[1]);
                if(t === "a" || t === "zombie" || t === "bandit" || t === "guard") {
                    if(t === "a") { applyStat(player, pair[0], pair[1]); if(conn) conn.send({type:'stat', s:pair[0], v:pair[1]}); }
                    entities.forEach(e => { if(e.type === t || t === 'a') { e.hp = parseFloat(pair[1]); e.speed = 5; } });
                }
            };

            if(cmd === "stat") runTarget(target, data);
            if(cmd === "teleport") { player.y = parseFloat(data); player.speed = 0; gameState = (player.y < 40000) ? "DRIVE" : "LOBBY"; }
            if(cmd === "gamerule" && data === "bridge true") { finale.active = true; finale.timer = 110; finale.crank = true; }
        }

        // --- MULTIPLAYER ---
        function hostGame() {
            player.name = document.getElementById('usernameIn').value || "Host";
            let id = Math.random().toString(36).substring(2, 7).toUpperCase();
            peer = new Peer(id);
            peer.on('open', code => { document.getElementById('roomCode').innerText = "ID: " + code; isHost = true; setupPeer(); });
        }

        function joinGame() {
            player.name = document.getElementById('usernameIn').value || "Guest";
            let code = document.getElementById('joinIn').value.trim().toUpperCase();
            peer = new Peer();
            peer.on('open', () => { conn = peer.connect(code); isHost = false; setupPeer(); });
        }

        function setupPeer() {
            if(isHost) peer.on('connection', c => { conn = c; conn.on('data', d => handleData(d)); });
            else conn.on('data', d => handleData(d));
        }

        function handleData(d) {
            if(d.type === 'sync') remotePlayers[d.id] = d;
            if(d.type === 'world') { entities = d.entities; finale = d.finale; buildings = d.buildings; outposts = d.outposts; }
            if(d.type === 'start') startGame();
            if(d.type === 'revive') { player.hp = 100; gameState = "DRIVE"; document.getElementById('deathScreen').style.display='none'; }
            if(d.type === 'stat') { applyStat(player, d.s, d.v); }
        }

        // --- WORLD LOGIC ---
        function initLobby() {
            gameState = "LOBBY"; document.getElementById('startScreen').style.display='none';
            buildings = [
                {x: -400, y: 50200, type: 'L_STORE', label: 'GENERAL STORE'},
                {x: 400, y: 50200, type: 'L_GUN', label: 'GUNSMITH'},
                {x: 0, y: 49500, type: 'TELE', label: 'TELEPORTER'}
            ];
            for(let key in snd) { snd[key].play().then(() => snd[key].volume = 0); }
        }

        function startGame() {
            gameState = "DRIVE"; document.getElementById('hud').style.display='block';
            player.x = 0; player.y = 0; player.speed = 0;
            if(isHost) {
                buildings = []; outposts = [];
                [3000, 6000, 9000].forEach(d => {
                    let y = -d * 100;
                    outposts.push({y, gate: 0, visited: false});
                    buildings.push({x:-450, y:y+300, type:'Trading', label:'TRADING POST'}, {x:450, y:y+300, type:'General', label:'GENERAL STORE'});
                    buildings.push({x:-450, y:y+600, type:'GunOut', label:'GUNSMITH'}, {x:450, y:y+600, type:'Mechanic', label:'MECHANIC'});
                });
                for(let i=0; i<15; i++) {
                    let ry = -(Math.random()*850000 + 50000);
                    buildings.push({x:-500, y:ry, type:'Bank', label:'BANK', looted:false}, {x:500, y:ry+500, type:'GunTown', label:'GUNSMITH', looted:false});
                }
                if(conn) conn.send({type:'start'});
            }
        }

        function reviveTeam() {
            if(player.scraps >= 75) { player.scraps -= 75; player.hp = 100; gameState = "DRIVE"; document.getElementById('deathScreen').style.display='none'; if(conn) conn.send({type:'revive'}); }
        }

        // --- UPDATE LOOP ---
        function update() {
            if(gameState === "START" || gameState === "DEAD") { updateAudio(); return; }

            let ox = player.x, oy = player.y;
            if(keys["KeyA"]) player.angle -= 0.05;
            if(keys["KeyD"]) player.angle += 0.05;
            // INCREASED SPEED AND ACCEL
            if(keys["KeyW"]) player.speed += 0.85 * player.speedM;
            if(keys["KeyS"]) player.speed -= 0.45;
            player.speed *= 0.97;
            player.x += Math.sin(player.angle) * player.speed;
            player.y -= Math.cos(player.angle) * player.speed;

            // Borders
            let lim = (gameState === "LOBBY") ? 600 : 2500;
            if(Math.abs(player.x) > lim) player.x = ox;
            if(gameState === "LOBBY" && (player.y > 50600 || player.y < 48500)) player.y = oy;
            if(player.y < -995000 && Math.abs(player.x) > 400) player.x = ox;

            outposts.forEach(o => {
                if(Math.abs(player.y - o.y) < 100 && Math.abs(player.x) > 250 && o.gate < 1) player.y = oy;
                if(isHost && !o.visited && Math.abs(player.y - o.y) < 800) {
                    for(let i=0; i<4; i++) entities.push({x: i%2?200:-200, y: o.y-400, type:'guard', hp:150, speed:0, angle:0});
                    o.visited = true;
                }
            });

            // Hazards (Massive Water)
            if(player.y < -1000000 && player.y > -1015000) {
                if(!(finale.timer < 120 && Math.abs(player.x) < 250) && !cheats.god) player.hp = 0;
            }

            // Interactions
            let near = false;
            buildings.forEach(b => {
                if(Math.hypot(player.x-b.x, player.y-b.y) < 200) {
                    near = true; let pr = document.getElementById('prompt'); pr.style.display='block';
                    if(b.type === 'TELE') { pr.innerText = "START DRIVE [E]"; if(keys["KeyE"]) startGame(); }
                    else if(b.type === 'L_STORE') {
                        pr.innerText = "METAL 5S [E] | WIRE 3S [F] | RADAR 10S [G]";
                        if(keys["KeyE"] && player.scraps >= 5) { player.armor='Sheet Metal'; player.armorHP=100; player.scraps-=5; keys["KeyE"]=false; }
                    } else if(b.type === 'Mechanic') {
                        pr.innerText = "UPGRADE HP [E] | SPD [F] | DMG [G] ($25)";
                        if(keys["KeyE"] && player.money >= 25) { player.maxHp*=1.05; player.hp=player.maxHp; player.money-=25; keys["KeyE"]=false; }
                    } else if(b.type === 'Bank' && !b.looted) {
                        pr.innerText = "ROB BANK [E]"; if(keys["KeyE"]) { player.gold+=2; player.silver+=4; b.looted=true; keys["KeyE"]=false; }
                    } else if(b.type === 'Trading') {
                        pr.innerText = "SELL LOOT [E]"; if(keys["KeyE"]) { player.money += (player.gold*50+player.silver*25); player.gold=0; player.silver=0; keys["KeyE"]=false; }
                    }
                }
            });
            if(!near) document.getElementById('prompt').style.display='none';

            // Finale Crank
            if(Math.hypot(player.x - 350, player.y + 990000) < 150 && !finale.crank) {
                document.getElementById('prompt').style.display = 'block'; document.getElementById('prompt').innerText = "START EVACUATION [E]";
                if(keys["KeyE"]) { finale.active = true; finale.crank = true; document.getElementById('timer').style.display = 'block'; keys["KeyE"]=false; }
            }

            // Combat
            if(keys["Space"] && (player.ammo > 0 || cheats.ammo) && player.cooldown <= 0) {
                bullets.push({x:player.x, y:player.y, ang:player.angle, owner:'p', dmg:25*player.dmgM});
                if(!cheats.ammo) player.ammo--; player.cooldown = 15;
            }
            player.cooldown--;

            if(isHost) {
                if(finale.active) {
                    finale.timer -= 1/60;
                    if(finale.timer > 120) outposts.forEach(o => { if(o.y < -800000) o.gate = Math.min(1, (240-finale.timer)/120); });
                    if(Date.now() > finale.lastS + 2500 && finale.spawned < 35) {
                        spawnNPC(finale.spawned < 15 ? 'bandit' : 'zombie');
                        finale.spawned++; finale.lastS = Date.now();
                    }
                    if(finale.timer <= 0) gameState = "WIN";
                }
                entities.forEach(e => {
                    if(e.type === 'guard') return;
                    let ang = Math.atan2(player.x-e.x, -(player.y-e.y)); e.angle = ang;
                    e.x += Math.sin(ang)*e.speed; e.y -= Math.cos(ang)*e.speed;
                    if(Math.hypot(player.x-e.x, player.y-e.y) < 75) player.hp -= 0.15;
                });
            }

            bullets.forEach((b,i) => {
                b.x += Math.sin(b.ang)*22; b.y -= Math.cos(b.ang)*22;
                entities.forEach(e => { if(Math.hypot(b.x-e.x, b.y-e.y) < 60) { e.hp -= b.dmg; bullets.splice(i,1); } });
                if(Math.abs(b.y - player.y) > 3000) bullets.splice(i,1);
            });

            entities = entities.filter(e => e.hp > 0);
            if(player.hp <= 0 && gameState !== "DEAD") { gameState = "DEAD"; triggerEnd(); }
            
            updateAudio();
            document.getElementById('vMoney').innerText = player.money;
            document.getElementById('vAmmo').innerText = player.ammo;
            document.getElementById('vScrap').innerText = player.scraps;
            document.getElementById('vDist').innerText = Math.floor(Math.abs(player.y)/100);

            if(conn && conn.open) {
                conn.send({type:'sync', id: peer.id, x: player.x, y: player.y, ang: player.angle, hp: player.hp, name: player.name});
                if(isHost) conn.send({type:'world', entities, finale, buildings, outposts});
            }
        }

        // --- AUDIO ENGINE ---
        function updateAudio() {
            let t = {lobby:0, spag:0, action:0, outlaw:0, bridge:0, ballad:0};
            if(gameState === "LOBBY") t.lobby = 0.8;
            else if(gameState === "DRIVE") {
                if(finale.active) t.bridge = 0.9;
                else {
                    let hB = entities.some(e=>e.type==='bandit'&&Math.hypot(e.x-player.x,e.y-player.y)<1200);
                    let hZ = entities.some(e=>e.type==='zombie'&&Math.hypot(e.x-player.x,e.y-player.y)<1200);
                    if(hB) { t.outlaw=0.8; if(lastBattleTrack !== 'outlaw') { snd.outlaw.currentTime = 0; snd.outlaw.play(); lastBattleTrack='outlaw'; } }
                    else if(hZ) { t.action=0.8; if(lastBattleTrack !== 'action') { snd.action.currentTime = 0; snd.action.play(); lastBattleTrack='action'; } }
                    else { t.spag=0.7; lastBattleTrack=null; }
                }
            } else t.ballad = 0.9;
            for(let k in snd) { let s = snd[k]; if(s.volume < t[k]) s.volume = Math.min(s.volume+0.015, t[k]); else s.volume = Math.max(s.volume-0.015, 0); }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.scale(zoom, zoom); ctx.translate(-player.x, -player.y);

            ctx.fillStyle = "#333"; ctx.fillRect(-300, -1100000, 600, 2200000);
            ctx.fillStyle = "#1a3a5a"; ctx.fillRect(-5000, -1015000, 10000, 1500);

            buildings.forEach(b => {
                ctx.fillStyle = (b.type==='Bank'?'#ffd700':'#8b4513'); ctx.fillRect(b.x-60, b.y-60, 120, 120);
                ctx.fillStyle = "#fff"; ctx.font="20px Arial"; ctx.textAlign="center"; ctx.fillText(b.label, b.x, b.y-80);
            });

            outposts.forEach(o => { ctx.fillStyle = "#555"; ctx.fillRect(-2500, o.y-50, 2250, 100); ctx.fillRect(250, o.y-50, 2250, 100); });

            if(finale.active) {
                ctx.fillStyle = "#444"; ctx.fillRect(-280, -1015000, 560, 1500 * Math.max(0, (120-finale.timer)/120));
            }

            drawCar(player.x, player.y, player.angle, "cyan", player.name, player.hp, player.maxHp, player.armor, player.turret);
            Object.values(remotePlayers).forEach(p => drawCar(p.x, p.y, p.ang, "orange", p.name, p.hp, 100, 'None', false));
            entities.forEach(e => drawCar(e.x, e.y, e.angle, e.type==='zombie'?'green':(e.type==='guard'?'black':'blue'), "", e.hp, e.maxHp, 'None', false));
            
            ctx.fillStyle="yellow"; bullets.forEach(b=>ctx.fillRect(b.x-4, b.y-4, 8, 8));
            ctx.restore(); update(); requestAnimationFrame(draw);
        }

        function drawCar(x, y, ang, col, name, hp, mhp, arm, tur) {
            ctx.save(); ctx.translate(x,y); ctx.rotate(ang);
            ctx.fillStyle = col; ctx.fillRect(-30, -60, 60, 120);
            ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fillRect(-25, -45, 50, 18);
            if(arm === 'Sheet Metal') { ctx.fillStyle = "#7f8c8d"; ctx.fillRect(-35, -65, 10, 130); ctx.fillRect(25, -65, 10, 130); }
            if(arm === 'Barbed Wire') { ctx.strokeStyle = "#34495e"; ctx.lineWidth = 3; ctx.strokeRect(-38, -68, 76, 136); }
            if(tur) { ctx.fillStyle = "#222"; ctx.beginPath(); ctx.arc(0, 0, 18, 0, 7); ctx.fill(); ctx.fillStyle="#444"; ctx.fillRect(-5,-35,10,35); }
            ctx.restore();
            
            ctx.fillStyle = "#fff"; ctx.font="bold 22px Arial"; ctx.textAlign="center"; ctx.fillText(name, x, y-100);
            ctx.fillStyle = "#000"; ctx.fillRect(x-50, y-90, 100, 10);
            ctx.fillStyle = hp > 30 ? "#0f0" : "#f00"; ctx.fillRect(x-50, y-90, (hp/mhp)*100, 10);
        }

        const keys = {};
        window.onkeydown = e => { if(document.activeElement.tagName !== 'INPUT') keys[e.code] = true; };
        window.onkeyup = e => keys[e.code] = false;
        function spawnNPC(t) { entities.push({x:player.x+(Math.random()*800-400), y:player.y-1200, type:t, hp:t==='zombie'?75:100, maxHp:t==='zombie'?75:100, speed:t==='zombie'?3.5:4.5, angle:0}); }
        function triggerEnd() { let s = (gameState === "WIN") ? document.getElementById('winScreen') : document.getElementById('deathScreen'); s.style.display='flex'; if(gameState==="DEAD") document.getElementById('deathDist').innerText=Math.floor(Math.abs(player.y)/100); }
        function addChatLine(n, m) { let l = document.getElementById('chatLines'); l.innerHTML += `<div><b>${n}:</b> ${m}</div>`; l.scrollTop = l.scrollHeight; }
        function sendChat() { let i = document.getElementById('chatIn'); if(i.value) { addChatLine(player.name, i.value); if(conn) conn.send({type:'chat', name:player.name, msg:i.value}); i.value=""; } }
        function toggleChat() { let b = document.getElementById('chatBox'); b.style.display = b.style.display==='none'?'flex':'none'; }
        function openConsole() { document.getElementById('cmdBox').style.display='block'; document.getElementById('cmdInput').focus(); }

        canvas.width = window.innerWidth; canvas.height = window.innerHeight; draw();
    </script>
</body>
</html>
